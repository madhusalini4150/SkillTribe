services:
  - type: web
    name: skilltribe
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11

      - key: SECRET_KEY
        generateValue: true

      - key: FLASK_ENV
        value: production

      - key: SEED_DEMO
        value: "true"

      - key: DATABASE_URL
        fromDatabase:
          name: skilltribe-db
          property: connectionString

databases:
  - name: skilltribe-db
    plan: free
